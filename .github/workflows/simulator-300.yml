name: DRS 300 Browser Simulations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.html"
      - "*.css"
      - "*.js"
      - "tests/**"
      - "playwright.lean.config.cjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/simulator-300.yml"

jobs:
  focused-regression:
    name: Focused learning regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start simulator
        run: npx http-server . -p 4173 -c-1 > /tmp/drs-server.log 2>&1 &

      - name: Run focused learning checks
        run: npx playwright test tests/release-smoke.spec.js --config=playwright.lean.config.cjs

      - name: Upload small failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: focused-failure-screenshot
          path: test-results/**/*.png
          if-no-files-found: ignore
          retention-days: 3

  simulation-matrix:
    name: 300-session matrix
    needs: focused-regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start simulator
        run: npx http-server . -p 4173 -c-1 > /tmp/drs-server.log 2>&1 &

      - name: Run 300 browser simulations
        run: npx playwright test tests/simulator-300.spec.js --config=playwright.lean.config.cjs

      - name: Upload small failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-failure-screenshot
          path: test-results/**/*.png
          if-no-files-found: ignore
          retention-days: 3
